<h2>Your Cart</h2>

{% for item in cart_items %}
  <div>
    <h3>{{ item.product.name }}</h3>
    <p>Quantity: {{ item.quantity }}</p>
    <p>Price: {{ item.product.price }}</p>
    <a href="/remove/{{ item.product.id }}/">Remove</a>
    <a href="/add/{{ item.product.id }}/">+</a>
    <a href="/decrease/{{ item.product.id }}/">-</a>
  </div>
{% endfor %}

<h3>Total: {{ total }}</h3>

<a href="/checkout/">Checkout</a>
